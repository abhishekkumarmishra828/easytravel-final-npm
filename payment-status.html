<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Status - EasyTravel</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="planner-card" style="max-width:900px;margin:50px auto;">
        <div class="hero-kicker" style="color:var(--navy);background:#edf3ff;border-color:#dbe4f6;">Cashfree payment status</div>
        <h1 style="font-size:56px;color:var(--navy);margin-bottom:16px">Payment verification</h1>
        <p id="paymentStatusMessage" style="font-size:22px;color:#49648f">Checking your payment...</p>
        <div id="paymentStatusCard" style="margin-top:18px;padding:18px;border-radius:18px;background:#f7faff;border:1px solid #d8e2f5"></div>
        <div style="margin-top:22px;display:flex;gap:12px;flex-wrap:wrap">
          <a class="primary-btn" href="/package.html">Back to package</a>
          <a class="secondary-btn" href="/results.html">Back to results</a>
        </div>
      </div>
    </div>
  </section>
  <script src="/payment-status.js"></script>
</body>
</html>
